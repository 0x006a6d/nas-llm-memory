services:
  db:
    image: groonga/pgroonga:latest-alpine-17
    restart: unless-stopped
    environment:
      POSTGRES_DB: claude_memory
      POSTGRES_USER: claude
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - /volume2/claude-system/db:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"   # ホスト内のみ。LAN公開しない(5432はUGOS内蔵PostgreSQLが使用中)
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude -d claude_memory"]
      interval: 10s
      timeout: 5s
      retries: 10

  ingest:
    build: ./ingest
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: claude_memory
      DB_USER: claude
      DB_PASSWORD_FILE: /run/secrets/db_password
      API_TOKEN_FILE: /run/secrets/api_token
    ports:
      - "8800:8800"              # LAN内の各端末からPOSTを受ける
    depends_on:
      db:
        condition: service_healthy
    secrets:
      - db_password
      - api_token

secrets:
  db_password:
    file: ./ingest/secrets/db_password
  api_token:
    file: ./ingest/secrets/api_token
